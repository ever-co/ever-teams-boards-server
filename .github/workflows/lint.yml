name: Lint

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js 16.x
        uses: actions/setup-node@v7
        with:
          node-version: 16.x
          cache: "yarn"
      - name: Install dependencies
        run: yarn --frozen-lockfile
      - name: Lint
        run: yarn test:other
